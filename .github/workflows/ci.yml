name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.12.2"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:run
