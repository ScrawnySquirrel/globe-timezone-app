<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globe Timezone App</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0a0a1a; color: #f0f0f0; font-family: "Segoe UI", system-ui, sans-serif; overflow: hidden; }
      #app { display: grid; grid-template-rows: 1fr auto; height: 100vh; }
      #globe-container { width: 100%; height: 100%; position: relative; }
      #hud { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 24px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); display: flex; align-items: center; justify-content: center; pointer-events: none; }
      #clock-display { font-size: clamp(14px, 2vw, 20px); font-family: "Courier New", monospace; letter-spacing: 0.05em; color: #88ddff; text-shadow: 0 0 12px rgba(136,221,255,0.5); }
      .error { display: flex; align-items: center; justify-content: center; height: 100%; padding: 2rem; text-align: center; color: #ff6b6b; font-size: 1.1rem; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="globe-container"></div>
      <div id="hud"><div id="clock-display">Select a timezone</div></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
